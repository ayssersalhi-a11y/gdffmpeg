# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  GitHub Actions — بناء libgdffmpeg.so (OpenSSL + FFmpeg + MediaCodec)   ║
# ║  v3.0 — الترتيب: OpenSSL → FFmpeg → libgdffmpeg.so                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: Build libgdffmpeg.so (OpenSSL + FFmpeg)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      NDK_VERSION:        r26c
      GODOT_CPP_BRANCH:   godot-4.3-stable
      FFMPEG_VERSION:     "7.0"
      OPENSSL_VERSION:    "3.0.13"
      ANDROID_API:        "24"

    steps:
      # ── 1. استنساخ الريبو ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Android NDK ───────────────────────────────────────────────────────
      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      # ── 3. أدوات البناء ──────────────────────────────────────────────────────
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build nasm yasm python3 git \
            pkg-config perl wget

      # ── 4. كاش godot-cpp ────────────────────────────────────────────────────
      - name: Cache godot-cpp
        uses: actions/cache@v4
        id: cache-godotcpp
        with:
          path: godot-cpp
          key: godot-cpp-${{ env.GODOT_CPP_BRANCH }}-v1

      - name: Clone godot-cpp
        if: steps.cache-godotcpp.outputs.cache-hit != 'true'
        run: |
          git clone --recursive \
            https://github.com/godotengine/godot-cpp.git \
            --branch ${{ env.GODOT_CPP_BRANCH }} \
            --depth 1 \
            godot-cpp

      # ── 5. كاش OpenSSL ──────────────────────────────────────────────────────
      - name: Cache OpenSSL
        uses: actions/cache@v4
        id: cache-openssl
        with:
          path: openssl_build
          key: openssl-${{ env.OPENSSL_VERSION }}-android-api${{ env.ANDROID_API }}-ndk${{ env.NDK_VERSION }}-v1

      # ── 6. بناء OpenSSL (إذا لم يوجد في الكاش) ──────────────────────────────
      - name: Build OpenSSL for Android arm64
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
          OPENSSL_VERSION: ${{ env.OPENSSL_VERSION }}
          API_LEVEL: ${{ env.ANDROID_API }}
        run: |
          chmod +x build_openssl_android.sh
          ./build_openssl_android.sh

      - name: Verify OpenSSL output
        run: |
          echo "── ملفات OpenSSL ──"
          ls -lh openssl_build/lib/
          ls openssl_build/include/openssl/ | head -10

      # ── 7. كاش FFmpeg ────────────────────────────────────────────────────────
      - name: Cache FFmpeg
        uses: actions/cache@v4
        id: cache-ffmpeg
        with:
          path: ffmpeg_build
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-openssl${{ env.OPENSSL_VERSION }}-api${{ env.ANDROID_API }}-ndk${{ env.NDK_VERSION }}-v1

      # ── 8. بناء FFmpeg (إذا لم يوجد في الكاش) ────────────────────────────────
      - name: Build FFmpeg + OpenSSL for Android arm64
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
          FFMPEG_VERSION: ${{ env.FFMPEG_VERSION }}
          API_LEVEL: ${{ env.ANDROID_API }}
        run: |
          chmod +x ffmpeg_build_android.sh
          ./ffmpeg_build_android.sh

      - name: Verify FFmpeg output
        run: |
          echo "── مكتبات FFmpeg ──"
          ls -lh ffmpeg_build/arm64-v8a/lib/

      # ── 9. بناء libgdffmpeg.so ────────────────────────────────────────────────
      - name: Build libgdffmpeg.so (arm64-v8a)
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -S . -B _cmake_build/arm64 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DGODOT_CPP_DIR="${{ github.workspace }}/godot-cpp" \
            -DFFMPEG_DIR="${{ github.workspace }}/ffmpeg_build" \
            -DOPENSSL_DIR="${{ github.workspace }}/openssl_build" \
            -DCMAKE_VERBOSE_MAKEFILE=OFF

          cmake --build _cmake_build/arm64 --parallel $(nproc)

      # ── 10. جمع الملفات الناتجة ───────────────────────────────────────────────
      - name: Collect output files
        run: |
          mkdir -p dist/addons/gdffmpeg/bin

          cp _cmake_build/arm64/libgdffmpeg.android.arm64.so \
             dist/addons/gdffmpeg/bin/ 2>/dev/null || true

          cp gdffmpeg.gdextension dist/addons/gdffmpeg/ 2>/dev/null || true

          echo "══ الملفات الناتجة ══"
          find dist/ -type f -exec ls -lh {} \;

      # ── 11. رفع الملفات ───────────────────────────────────────────────────────
      - name: Upload compiled .so files
        uses: actions/upload-artifact@v4
        with:
          name: libgdffmpeg-android-openssl-${{ github.ref_name }}-${{ github.run_number }}
          path: dist/
          retention-days: 30
          if-no-files-found: error

      # ── 12. ملخص ─────────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ البناء مكتمل (OpenSSL + FFmpeg + MediaCodec)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| الملف | الحجم |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/addons/gdffmpeg/bin/*.so; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
